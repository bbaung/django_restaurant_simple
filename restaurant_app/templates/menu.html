{% extends 'base.html' %}
{% load static %}
{% block content %}
<h1>Menu</h1>
<!--Begin col-->
<div class="column">
   <!-- Step 14: Create for loop -->
   <ul>
   {% for item in mymenu  %}
      <li>

         <a href="{% url 'menu_item' pk=item.id %}">
            <!-- Step 14: Add DTL variable for name -->
            {{item.name}}
            
         </a>
         <span class="menu-price">
               <!-- Step 14: Add DTL variable for price --> 
               ${{item.price | floatformat:2}}
         </span>
      </li>
   <!-- Step 14: End or loop -->
   {% endfor %}  
   </ul>
</div>
<!--End col-->
{% endblock %}
